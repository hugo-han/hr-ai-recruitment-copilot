services:
  backend:
    build: ./backend
    environment:
      - APP_ENV=prod
      - APP_DEBUG=false
      - APP_SECRET_KEY=${APP_SECRET_KEY:-change-me}
      - DATABASE_URL=postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/hr_copilot
      - REDIS_URL=redis://redis:6379/0
      - LLM_PROVIDER=${LLM_PROVIDER:-mock}
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=hr_copilot
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  db-data:
